<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .tile { fill: #1c130d; }
    .z    { fill: #f7f1e6; }
    .x    { fill: oklch(0.58 0.20 30); }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #f7f1e6; }
      .z    { fill: #1c130d; }
    }
  </style>
  <rect class="tile" width="100" height="100" rx="18" ry="18" />
  <text class="z" x="50" y="50" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="800" font-style="italic" font-size="89" style="dominant-baseline:central">Z</text>
  <text class="x" x="67" y="64" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="800" font-style="italic" font-size="49" style="dominant-baseline:central">x</text>
</svg>
